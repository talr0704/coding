<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editor — CodeKids</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="editor-page">

  <!-- Top bar -->
  <header class="editor-topbar">
    <div class="editor-topbar-left">
      <a href="dashboard.html" class="back-btn" title="Back to projects">← Back</a>
      <span class="topbar-logo-sm">🚀 CodeKids</span>
      <span id="project-type-badge" class="type-badge"></span>
    </div>
    <div class="editor-topbar-center">
      <input type="text" id="project-title" class="project-title-input" value="Loading..." maxlength="40" />
    </div>
    <div class="editor-topbar-right">
      <span id="save-status" class="save-status">●  Saved</span>
      <button class="btn-run" id="run-btn">▶ Run</button>
      <button class="btn-save" id="save-btn">💾 Save</button>
    </div>
  </header>

  <!-- Editor layout -->
  <div class="editor-layout">

    <!-- Left: code panel -->
    <div class="code-panel" id="code-panel">
      <!-- File tabs (multi-file) -->
      <div class="file-tabs" id="file-tabs"></div>

      <!-- CodeMirror mount -->
      <div class="cm-wrapper" id="cm-wrapper">
        <textarea id="code-textarea"></textarea>
      </div>
    </div>

    <!-- Resize handle -->
    <div class="resize-handle" id="resize-handle"></div>

    <!-- Right: output panel -->
    <div class="output-panel" id="output-panel">

      <!-- Python output -->
      <div id="python-output-section">
        <div class="output-toolbar">
          <span class="output-label">🖥️ Output</span>
          <button class="btn-clear" id="clear-btn">Clear</button>
        </div>
        <div id="output-area" class="output-area">
          <p class="output-hint">Click <strong>▶ Run</strong> to execute your code!</p>
        </div>
        <!-- Input box (shown when input() is called) -->
        <div id="input-bar" class="input-bar" style="display:none;">
          <span id="input-prompt-label" class="input-prompt-label"></span>
          <input type="text" id="python-input" class="python-input" placeholder="Type your answer..." />
          <button id="input-submit" class="btn-input-submit">↵</button>
        </div>
      </div>

      <!-- HTML preview -->
      <div id="html-output-section" style="display:none;">
        <div class="output-toolbar">
          <span class="output-label">🌐 Preview</span>
          <button class="btn-clear" id="refresh-preview-btn">↺ Refresh</button>
        </div>
        <iframe id="html-preview" class="html-preview" sandbox="allow-scripts"></iframe>
      </div>

    </div>
  </div>

  <!-- Skulpt -->
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
  <!-- CodeMirror -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { FIREBASE_CONFIG } from "./js/config.js";

    const app = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const params = new URLSearchParams(location.search);
    const projectId = params.get("id");
    const projectType = params.get("type") || "python";

    // ── UI refs ──────────────────────────────────────────────
    const badge = document.getElementById("project-type-badge");
    const titleInput = document.getElementById("project-title");
    const saveStatus = document.getElementById("save-status");
    const runBtn = document.getElementById("run-btn");
    const saveBtn = document.getElementById("save-btn");
    const outputArea = document.getElementById("output-area");
    const inputBar = document.getElementById("input-bar");
    const pythonInputEl = document.getElementById("python-input");
    const inputSubmit = document.getElementById("input-submit");
    const inputPromptLabel = document.getElementById("input-prompt-label");
    const htmlPreview = document.getElementById("html-preview");

    // ── Show correct output panel ────────────────────────────
    if (projectType === "html") {
      document.getElementById("python-output-section").style.display = "none";
      document.getElementById("html-output-section").style.display = "flex";
      badge.textContent = "🌐 HTML & CSS";
      badge.className = "type-badge badge-html";
    } else {
      badge.textContent = "🐍 Python";
      badge.className = "type-badge badge-python";
    }

    // ── CodeMirror ───────────────────────────────────────────
    const editor = CodeMirror.fromTextArea(document.getElementById("code-textarea"), {
      mode: projectType === "html" ? "htmlmixed" : "python",
      theme: "dracula",
      lineNumbers: true,
      autoCloseBrackets: true,
      matchBrackets: true,
      indentUnit: 4,
      tabSize: 4,
      indentWithTabs: false,
      lineWrapping: true,
      extraKeys: {
        "Ctrl-Enter": runCode,
        "Cmd-Enter": runCode,
        "Ctrl-S": saveProject,
        "Cmd-S": saveProject,
        Tab: cm => cm.execCommand("insertSoftTab")
      }
    });

    // ── Multi-file support (tabs) ────────────────────────────
    // For HTML projects: one tab. Python: one tab per file.
    // Files stored as { filename: code } object.
    let files = {};
    let activeFile = "";

    function buildFileTabs() {
      const tabsEl = document.getElementById("file-tabs");
      tabsEl.innerHTML = "";
      Object.keys(files).forEach(filename => {
        const tab = document.createElement("button");
        tab.className = "file-tab" + (filename === activeFile ? " active" : "");
        tab.textContent = filename;
        tab.addEventListener("click", () => switchFile(filename));
        tabsEl.appendChild(tab);
      });

      if (projectType === "python") {
        const addBtn = document.createElement("button");
        addBtn.className = "file-tab-add";
        addBtn.textContent = "+ File";
        addBtn.addEventListener("click", addNewFile);
        tabsEl.appendChild(addBtn);
      }
    }

    function switchFile(filename) {
      files[activeFile] = editor.getValue();
      activeFile = filename;
      editor.setValue(files[filename]);
      editor.setOption("mode", filename.endsWith(".html") || filename.endsWith(".css") ? "htmlmixed" : "python");
      buildFileTabs();
    }

    function addNewFile() {
      const name = prompt("New file name (e.g. helper.py):", "helper.py");
      if (!name) return;
      const safeName = name.replace(/[^a-zA-Z0-9._-]/g, "").replace(/\.+/g, ".");
      if (!safeName || files[safeName]) return;
      files[activeFile] = editor.getValue();
      files[safeName] = "# " + safeName + "\n";
      activeFile = safeName;
      editor.setValue(files[safeName]);
      buildFileTabs();
      markUnsaved();
    }

    // ── Auth guard & load project ────────────────────────────
    let currentUser = null;
    onAuthStateChanged(auth, async user => {
      if (!user) { window.location.href = "index.html"; return; }
      currentUser = user;
      if (!projectId) { window.location.href = "dashboard.html"; return; }
      await loadProject();
    });

    async function loadProject() {
      try {
        const snap = await getDoc(doc(db, "users", currentUser.uid, "projects", projectId));
        if (!snap.exists()) { window.location.href = "dashboard.html"; return; }
        const data = snap.data();
        titleInput.value = data.name || "Untitled";

        if (typeof data.code === "object" && data.code !== null) {
          files = data.code;
        } else {
          const defaultFilename = projectType === "html" ? "index.html" : "main.py";
          files = { [defaultFilename]: data.code || "" };
        }
        activeFile = Object.keys(files)[0];
        editor.setValue(files[activeFile]);
        buildFileTabs();

        if (projectType === "html") refreshHtmlPreview();
      } catch (e) {
        console.error(e);
        alert("Could not load project.");
      }
    }

    // ── Save ─────────────────────────────────────────────────
    let unsaved = false;

    function markUnsaved() {
      unsaved = true;
      saveStatus.textContent = "● Unsaved";
      saveStatus.className = "save-status unsaved";
    }

    editor.on("change", markUnsaved);
    titleInput.addEventListener("input", markUnsaved);

    async function saveProject() {
      if (!currentUser || !projectId) return;
      files[activeFile] = editor.getValue();
      saveBtn.disabled = true;
      saveBtn.textContent = "Saving...";
      try {
        await updateDoc(doc(db, "users", currentUser.uid, "projects", projectId), {
          name: titleInput.value.trim() || "Untitled",
          code: files,
          updatedAt: serverTimestamp()
        });
        saveStatus.textContent = "● Saved";
        saveStatus.className = "save-status saved";
        unsaved = false;
      } catch (e) {
        console.error(e);
        saveStatus.textContent = "● Save failed";
        saveStatus.className = "save-status error";
      }
      saveBtn.disabled = false;
      saveBtn.textContent = "💾 Save";
    }

    saveBtn.addEventListener("click", saveProject);

    // Auto-save every 30 seconds
    setInterval(() => { if (unsaved) saveProject(); }, 30000);

    // Warn on leave
    window.addEventListener("beforeunload", e => {
      if (unsaved) { e.preventDefault(); e.returnValue = ""; }
    });

    // ── Run Python (Skulpt) ──────────────────────────────────
    let inputResolve = null;

    function appendOutput(text, cls = "") {
      const line = document.createElement("div");
      line.className = "output-line" + (cls ? " " + cls : "");
      line.textContent = text;
      outputArea.appendChild(line);
      outputArea.scrollTop = outputArea.scrollHeight;
    }

    function skulptOutput(text) {
      appendOutput(text);
    }

    function skulptInput(prompt) {
      return new Promise(resolve => {
        inputResolve = resolve;
        inputPromptLabel.textContent = prompt || "";
        inputBar.style.display = "flex";
        pythonInputEl.value = "";
        pythonInputEl.focus();
      });
    }

    function submitInput() {
      const val = pythonInputEl.value;
      appendOutput((inputPromptLabel.textContent || "") + val, "output-input-echo");
      inputBar.style.display = "none";
      if (inputResolve) { inputResolve(val); inputResolve = null; }
    }

    inputSubmit.addEventListener("click", submitInput);
    pythonInputEl.addEventListener("keydown", e => { if (e.key === "Enter") submitInput(); });
    document.getElementById("clear-btn").addEventListener("click", () => {
      outputArea.innerHTML = '<p class="output-hint">Click <strong>▶ Run</strong> to execute your code!</p>';
    });

    async function runPython() {
      files[activeFile] = editor.getValue();
      outputArea.innerHTML = "";
      runBtn.disabled = true;
      runBtn.textContent = "⏳ Running...";

      // Build Skulpt filesystem from all .py files
      const extraFiles = {};
      Object.entries(files).forEach(([name, code]) => {
        if (name !== "main.py" && name.endsWith(".py")) {
          extraFiles[name] = code;
        }
      });

      Sk.configure({
        output: skulptOutput,
        read: file => {
          if (extraFiles[file]) return extraFiles[file];
          if (Sk.builtinFiles?.files?.[file]) return Sk.builtinFiles.files[file];
          throw new Error("File not found: " + file);
        },
        inputfun: skulptInput,
        inputfunTakesPrompt: true,
        __future__: Sk.python3
      });

      try {
        await Sk.misceval.asyncToPromise(() =>
          Sk.importMainWithBody("<stdin>", false, files["main.py"] || editor.getValue(), true)
        );
        appendOutput("\n✅ Program finished!", "output-success");
      } catch (err) {
        appendOutput(err.toString(), "output-error");
      }

      runBtn.disabled = false;
      runBtn.textContent = "▶ Run";
    }

    // ── HTML Preview ─────────────────────────────────────────
    function refreshHtmlPreview() {
      files[activeFile] = editor.getValue();
      const code = files["index.html"] || editor.getValue();
      htmlPreview.srcdoc = code;
    }

    document.getElementById("refresh-preview-btn")?.addEventListener("click", refreshHtmlPreview);

    // ── Run button ───────────────────────────────────────────
    function runCode() {
      if (projectType === "html") {
        refreshHtmlPreview();
      } else {
        runPython();
      }
    }

    runBtn.addEventListener("click", runCode);

    // ── Resize handle ────────────────────────────────────────
    const resizeHandle = document.getElementById("resize-handle");
    const codePanel = document.getElementById("code-panel");
    const outputPanel = document.getElementById("output-panel");
    let isResizing = false;

    resizeHandle.addEventListener("mousedown", e => {
      isResizing = true;
      document.body.style.cursor = "col-resize";
      document.body.style.userSelect = "none";
    });
    document.addEventListener("mousemove", e => {
      if (!isResizing) return;
      const layout = document.querySelector(".editor-layout");
      const rect = layout.getBoundingClientRect();
      const pct = ((e.clientX - rect.left) / rect.width) * 100;
      const clamped = Math.min(80, Math.max(20, pct));
      codePanel.style.flex = "none";
      codePanel.style.width = clamped + "%";
      outputPanel.style.flex = "1";
      editor.refresh();
    });
    document.addEventListener("mouseup", () => {
      isResizing = false;
      document.body.style.cursor = "";
      document.body.style.userSelect = "";
    });
  </script>
</body>
</html>
