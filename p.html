<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeKids</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Top bar ──────────────────────────────────────────────── */
    .topbar {
      display: flex; align-items: center; gap: 1rem;
      padding: 0 1.25rem;
      background: #12122a;
      border-bottom: 1.5px solid #2d2b55;
      flex-shrink: 0;
      height: 46px;
    }
    .logo {
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }
    .project-title {
      flex: 1;
      font-size: 0.95rem; font-weight: 700; color: #a78bfa;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── Content ──────────────────────────────────────────────── */
    .content {
      flex: 1; overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* Loading */
    .loading {
      flex: 1; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 0.75rem; color: #6b6b8b; font-size: 1rem;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #2d2b55; border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Turtle canvas */
    #turtle-canvas {
      flex: 1; overflow: auto; background: white;
      display: none;
      align-items: flex-start; justify-content: flex-start;
    }

    /* Text output */
    #output-area {
      flex: 1; overflow-y: auto; padding: 1rem 1.25rem;
      font-family: 'Fira Mono', 'Consolas', monospace;
      font-size: 13.5px; line-height: 1.65;
      display: none;
    }
    .output-line { white-space: pre-wrap; word-break: break-word; }
    .output-success { color: #86efac; font-weight: 600; }
    .output-error-card {
      background: rgba(239,68,68,0.08); border: 1.5px solid #ef4444;
      border-radius: 8px; padding: 0.75rem 1rem; margin: 0.5rem 0;
    }
    .output-error-label { color: #fca5a5; font-weight: 700; direction: rtl; text-align: right; margin-bottom: 0.3rem; }
    .output-error-hint  { color: #fbbf24; font-size: 0.82rem; direction: rtl; text-align: right; margin-bottom: 0.5rem; }
    .output-error-tech  {
      color: #f87171; font-family: 'Fira Mono', monospace; font-size: 12px;
      white-space: pre-wrap; border-top: 1px solid rgba(239,68,68,0.3); padding-top: 0.4rem;
    }

    /* HTML preview */
    #html-preview { flex: 1; border: none; background: white; display: none; }
  </style>
</head>
<body>

  <header class="topbar">
    <a href="index.html" class="logo">🚀 CodeKids</a>
    <span class="project-title" id="project-title">Loading…</span>
  </header>

  <div class="content">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span>Loading project…</span>
    </div>
    <div id="output-area"></div>
    <div id="turtle-canvas"></div>
    <!-- allow-same-origin is intentionally omitted to prevent sandbox escape -->
    <iframe id="html-preview" sandbox="allow-scripts"></iframe>
  </div>

  <!-- Python runtime — loaded only on this lightweight page, not in editor -->
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
  <script src="js/turtle-engine.js"></script>

  <script type="module">
    import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth }         from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore }    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { FIREBASE_CONFIG } from "./js/config.js";
    import { initFirestore, getPublicProject } from "./js/projects.js";
    import { runPython, formatPythonError, usesTurtle } from "./js/runner.js";

    const app = initializeApp(FIREBASE_CONFIG);
    getAuth(app);          // must initialise Auth so Firestore SDK doesn't hang
    initFirestore(app);

    const publicId    = new URLSearchParams(location.search).get("id");
    const loadingEl   = document.getElementById("loading");
    const titleEl     = document.getElementById("project-title");
    const outputArea  = document.getElementById("output-area");
    const turtleCanvas = document.getElementById("turtle-canvas");
    const htmlPreview = document.getElementById("html-preview");

    function showError(msg) {
      loadingEl.innerHTML = `<span style="color:#fca5a5">${msg}</span>`;
    }

    function escHtml(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function appendText(text, cls = "") {
      outputArea.style.display = "block";
      const line = document.createElement("div");
      line.className = "output-line" + (cls ? " " + cls : "");
      line.textContent = text;
      outputArea.appendChild(line);
    }

    (async () => {
      if (!publicId) { showError("Invalid preview link."); return; }

      let data;
      try {
        data = await getPublicProject(publicId);
      } catch (e) {
        console.error(e);
        showError("Could not load project.");
        return;
      }

      if (!data) {
        showError("This project is private or does not exist.");
        return;
      }

      const { title, type: projectType, code, images } = data;

      titleEl.textContent = title || "Untitled";
      document.title = (title || "Untitled") + " — CodeKids";

      // Normalise code into { filename: source } map
      let files = {};
      if (typeof code === "object" && code !== null) {
        files = code;
      } else {
        const defaultFile = projectType === "html" ? "index.html" : "main.py";
        files = { [defaultFile]: code || "" };
      }

      loadingEl.style.display = "none";

      // ── HTML project ───────────────────────────────────────────────────────
      if (projectType === "html") {
        htmlPreview.style.display = "block";
        htmlPreview.srcdoc = files["index.html"] || Object.values(files)[0] || "";
        return;
      }

      // ── Python project ─────────────────────────────────────────────────────
      const mainCode  = files["main.py"] || Object.values(files)[0] || "";
      const hasTurtle = usesTurtle(mainCode);

      if (hasTurtle) { turtleCanvas.style.display = "flex"; }
      else            { outputArea.style.display   = "block"; }

      // Build { cleanName: url } map for shape pre-registration
      const imgMap = {};
      (images || []).forEach(img => {
        const clean = img.name.replace(/\.[^.]+$/, "").replace(/[^a-zA-Z0-9_-]/g, "_");
        imgMap[clean] = img.url;
      });

      // Collect non-main Python files (helper modules)
      const extraFiles = {};
      Object.entries(files).forEach(([name, src]) => {
        if (name !== "main.py" && name.endsWith(".py")) extraFiles[name] = src;
      });

      const result = await runPython({
        mainCode,
        extraFiles,
        onOutput: text => appendText(text),
        onInput:  () => Promise.resolve(""),
        turtleTarget:  hasTurtle ? "turtle-canvas" : null,
        projectImages: hasTurtle ? imgMap : null
      });

      if (!result.success) {
        const fmt = formatPythonError(result.error);
        outputArea.style.display = "block";
        const card = document.createElement("div");
        card.className = "output-error-card";
        card.innerHTML = `
          <div class="output-error-label">${fmt.hebrewLabel}</div>
          <div class="output-error-hint">${fmt.hebrewHint}</div>
          <div class="output-error-tech">${escHtml(fmt.technical)}</div>`;
        outputArea.appendChild(card);
      } else if (!hasTurtle) {
        appendText("\n✅ Program finished!", "output-success");
      }
    })();
  </script>
</body>
</html>
