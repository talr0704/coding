<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Projects — CodeKids</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .btn-download-zip {
      background: #0d9488; border: none; color: #fff;
      font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 700;
      padding: 0.55rem 1.1rem; border-radius: 12px; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-download-zip:hover  { background: #0f766e; }
    .btn-download-zip:disabled { opacity: 0.6; cursor: default; }
  </style>
</head>
<body class="dashboard-page">

  <header class="topbar">
    <a href="index.html" class="topbar-logo">
      <span class="logo-icon-sm">🚀</span>
      <span class="logo-text-sm">CodeKids</span>
    </a>
    <div class="topbar-user">
      <img id="user-avatar" src="" alt="" class="topbar-avatar" />
      <span id="user-name">...</span>
      <button class="btn-signout-sm" id="sign-out-btn">Sign Out</button>
    </div>
  </header>

  <main class="dashboard-main">
    <div class="dashboard-header">
      <div>
        <h1 class="dashboard-title">My Projects 📁</h1>
        <p class="dashboard-subtitle" id="project-count">Loading...</p>
      </div>
      <div style="display:flex;gap:0.6rem;align-items:center;">
        <button class="btn-download-zip" id="download-btn">⬇️ Download All</button>
        <button class="btn-download-zip" id="create-student-btn" style="display:none;background:#7c3aed;">👤 Create Student Account</button>
        <button class="btn-new-project"  id="new-project-btn">+ New Project</button>
      </div>
    </div>

    <div id="projects-grid" class="projects-grid">
      <div class="loading-spinner">
        <div class="spinner"></div>
        <p>Loading your projects...</p>
      </div>
    </div>
  </main>

  <!-- New Project Modal -->
  <div id="new-project-modal" class="modal-backdrop" style="display:none;">
    <div class="modal">
      <h2 class="modal-title">Create a New Project 🎨</h2>
      <div class="form-group">
        <label for="project-title-input">Project Name</label>
        <input type="text" id="project-title-input" placeholder="My Awesome Project" maxlength="40" />
      </div>
      <div class="form-group">
        <label>Project Type</label>
        <div class="type-selector">
          <button class="type-btn active" data-type="python">🐍 Python</button>
          <button class="type-btn"        data-type="html">🌐 HTML &amp; CSS</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancel-modal">Cancel</button>
        <button class="btn-create" id="create-project-btn">Create Project 🚀</button>
      </div>
    </div>
  </div>

  <!-- Create Student Account Modal (teachers only) -->
  <div id="create-student-modal" class="modal-backdrop" style="display:none;">
    <div class="modal modal-sm">
      <h2 class="modal-title">Create Student Account 👤</h2>
      <p style="font-size:0.9rem;color:#6b7280;margin-bottom:1rem;">
        The student must already be registered in the system (via Zapier).
      </p>
      <div class="form-group">
        <label for="student-email-input">Student Email</label>
        <input type="email" id="student-email-input" placeholder="student@gmail.com" />
      </div>
      <div class="form-group">
        <label for="student-password-input">Temporary Password</label>
        <input type="password" id="student-password-input" placeholder="Min 6 characters" />
      </div>
      <div id="create-student-error" style="color:#ef4444;font-size:0.85rem;min-height:1.2rem;margin-bottom:0.5rem;"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancel-create-student">Cancel</button>
        <button class="btn-create" id="confirm-create-student">Create Account 🚀</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div id="delete-modal" class="modal-backdrop" style="display:none;">
    <div class="modal modal-sm">
      <h2 class="modal-title">Delete Project? 🗑️</h2>
      <p class="modal-body-text">This will permanently delete "<span id="delete-project-name"></span>". This can't be undone!</p>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancel-delete">Keep it</button>
        <button class="btn-delete" id="confirm-delete">Delete</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script type="module">
    import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-functions.js";
    import { FIREBASE_CONFIG }  from "./js/config.js";
    import { initAuth, onAuthChange, doSignOut } from "./js/auth.js";
    import { initFirestore, createProject, listProjects, deleteProject } from "./js/projects.js";

    const app  = initializeApp(FIREBASE_CONFIG);
    const auth = initAuth(app);
    const db   = initFirestore(app);
    const fns  = getFunctions(app);

    const STARTER_CODE = {
      python: `# Welcome to CodeKids! 🐍
# Write your Python code below and click Run!

name = input("What's your name? ")
print("Hello, " + name + "! Welcome to coding! 🎉")

for i in range(5):
    print("⭐ " * (i + 1))
`,
      html: `<!DOCTYPE html>
<html>
<head>
  <title>My Page</title>
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 2rem 3rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    h1 { color: #6c3fc5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🌟 Hello World!</h1>
    <p>Welcome to my webpage. Edit me!</p>
  </div>
</body>
</html>`
    };

    let currentUser   = null;
    let selectedType  = "python";
    let deleteTarget  = null;   // { id, title }

    // ── Auth guard ───────────────────────────────────────────
    onAuthChange(async user => {
      if (!user) { window.location.href = "index.html"; return; }
      currentUser = user;
      document.getElementById("user-name").textContent = user.displayName || user.email || "Coder";
      if (user.photoURL) document.getElementById("user-avatar").src = user.photoURL;

      // Show teacher button if user has role: "teacher"
      const db2 = getFirestore(app);
      const snap = await getDoc(doc(db2, "authorizedStudents", (user.email || "").toLowerCase()));
      if (snap.exists() && snap.data().role === "teacher") {
        document.getElementById("create-student-btn").style.display = "";
      }

      await loadProjects();
    });

    document.getElementById("sign-out-btn").addEventListener("click", () => doSignOut());

    // ── Create student account (teacher only) ────────────────
    document.getElementById("create-student-btn").addEventListener("click", () => {
      document.getElementById("student-email-input").value = "";
      document.getElementById("student-password-input").value = "";
      document.getElementById("create-student-error").textContent = "";
      document.getElementById("create-student-modal").style.display = "flex";
    });

    document.getElementById("cancel-create-student").addEventListener("click", () => {
      document.getElementById("create-student-modal").style.display = "none";
    });

    document.getElementById("confirm-create-student").addEventListener("click", async () => {
      const email    = document.getElementById("student-email-input").value.trim();
      const password = document.getElementById("student-password-input").value;
      const errEl    = document.getElementById("create-student-error");
      const btn      = document.getElementById("confirm-create-student");

      if (!email || !password) { errEl.textContent = "Please fill in all fields."; return; }
      if (password.length < 6) { errEl.textContent = "Password must be at least 6 characters."; return; }

      btn.disabled = true; btn.textContent = "Creating...";
      try {
        const createStudentAccount = httpsCallable(fns, "createStudentAccount");
        const result = await createStudentAccount({ email, password });
        document.getElementById("create-student-modal").style.display = "none";
        alert(result.data.created
          ? `✅ Account created for ${email}`
          : `✅ Password updated for ${email}`);
      } catch (e) {
        errEl.textContent = e.message || "Error creating account.";
      } finally {
        btn.disabled = false; btn.textContent = "Create Account 🚀";
      }
    });

    // ── Project type selector ────────────────────────────────
    document.querySelectorAll(".type-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".type-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedType = btn.dataset.type;
      });
    });

    // ── New project modal ────────────────────────────────────
    document.getElementById("new-project-btn").addEventListener("click", () => {
      document.getElementById("project-title-input").value = "";
      selectedType = "python";
      document.querySelectorAll(".type-btn").forEach(b => b.classList.remove("active"));
      document.querySelector('.type-btn[data-type="python"]').classList.add("active");
      document.getElementById("new-project-modal").style.display = "flex";
      setTimeout(() => document.getElementById("project-title-input").focus(), 100);
    });

    document.getElementById("cancel-modal").addEventListener("click", () => {
      document.getElementById("new-project-modal").style.display = "none";
    });

    document.getElementById("create-project-btn").addEventListener("click", async () => {
      const title = document.getElementById("project-title-input").value.trim() || "Untitled Project";
      const btn = document.getElementById("create-project-btn");
      btn.disabled = true; btn.textContent = "Creating...";

      try {
        const ref = await createProject(currentUser.uid, {
          title,
          type: selectedType,
          code: STARTER_CODE[selectedType]
        });
        document.getElementById("new-project-modal").style.display = "none";
        window.location.href = `editor.html?id=${ref.id}&type=${selectedType}`;
      } catch (e) {
        console.error(e);
        alert("Oops! Couldn't create project. Check your Firebase config.");
        btn.disabled = false;
        btn.textContent = "Create Project 🚀";
      }
    });

    // ── Delete modal ─────────────────────────────────────────
    document.getElementById("cancel-delete").addEventListener("click", () => {
      document.getElementById("delete-modal").style.display = "none";
    });

    document.getElementById("confirm-delete").addEventListener("click", async () => {
      if (!deleteTarget) return;
      try {
        await deleteProject(currentUser.uid, deleteTarget.id);
      } catch (e) {
        console.error(e);
      }
      document.getElementById("delete-modal").style.display = "none";
      await loadProjects();
    });

    // ── Load & render projects ───────────────────────────────
    async function loadProjects() {
      const grid = document.getElementById("projects-grid");
      grid.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><p>Loading...</p></div>';

      try {
        const projects = await listProjects(currentUser.uid);
        const count = document.getElementById("project-count");
        count.textContent = projects.length === 0
          ? "No projects yet — create your first one!"
          : `${projects.length} project${projects.length !== 1 ? "s" : ""}`;

        if (projects.length === 0) {
          grid.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">🎨</div>
              <h2>No projects yet!</h2>
              <p>Click <strong>"+ New Project"</strong> to create your first coding adventure.</p>
            </div>`;
          return;
        }

        grid.innerHTML = projects.map(p => {
          const icon  = p.type === "html" ? "🌐" : "🐍";
          const color = p.type === "html" ? "card-html" : "card-python";
          const date  = p.updatedAt?.toDate
            ? p.updatedAt.toDate().toLocaleDateString()
            : "Just now";
          // Use title field (fall back to name for legacy documents)
          const title = esc(p.title ?? p.name ?? "Untitled");

          // Show thumbnail from first image if available
          const thumb = (p.images && p.images.length > 0)
            ? `<img src="${esc(p.images[0].url)}" alt="thumbnail" class="project-thumb" loading="lazy" />`
            : `<div class="project-card-icon">${icon}</div>`;

          return `
            <div class="project-card ${color}">
              ${thumb}
              <div class="project-card-body">
                <h3 class="project-name">${title}</h3>
                <p class="project-meta">${p.type === "html" ? "HTML & CSS" : "Python"} · ${date}${p.images?.length ? ` · ${p.images.length} 🖼️` : ""}</p>
              </div>
              <div class="project-card-actions">
                <a href="editor.html?id=${p.id}&type=${esc(p.type)}" class="btn-open">Open ✏️</a>
                <button class="btn-del" data-id="${p.id}" data-title="${title}" title="Delete project">🗑️</button>
              </div>
            </div>`;
        }).join("");

        grid.querySelectorAll(".btn-del").forEach(btn => {
          btn.addEventListener("click", () => {
            deleteTarget = { id: btn.dataset.id, title: btn.dataset.title };
            document.getElementById("delete-project-name").textContent = btn.dataset.title;
            document.getElementById("delete-modal").style.display = "flex";
          });
        });

      } catch (e) {
        console.error(e);
        grid.innerHTML = '<p class="error-msg">Could not load projects. Check your Firebase config.</p>';
      }
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    // ── Download all projects as ZIP ─────────────────────────
    document.getElementById("download-btn").addEventListener("click", async () => {
      if (!currentUser) return;
      const btn = document.getElementById("download-btn");
      btn.disabled = true; btn.textContent = "⏳ Packing…";

      try {
        const zip     = new window.JSZip();
        const projects = await listProjects(currentUser.uid);

        if (projects.length === 0) {
          alert("No projects to download.");
          return;
        }

        // Track folder names to avoid duplicates
        const seen = {};
        projects.forEach(p => {
          // Sanitise title for use as a folder/file name
          let name = (p.title ?? p.name ?? "Untitled")
            .replace(/[<>:"/\\|?*\x00-\x1f]/g, "_").trim() || "Untitled";

          // Deduplicate: "My Project", "My Project (2)", …
          if (seen[name]) { seen[name]++; name = `${name} (${seen[name]})`; }
          else            { seen[name] = 1; }

          const folder = zip.folder(name);

          // Normalise code to { filename: source } map
          let files = {};
          if (typeof p.code === "object" && p.code !== null) {
            files = p.code;
          } else {
            const def = p.type === "html" ? "index.html" : "main.py";
            files = { [def]: p.code || "" };
          }

          Object.entries(files).forEach(([fname, src]) => {
            folder.file(fname, src || "");
          });
        });

        const blob = await zip.generateAsync({ type: "blob", compression: "DEFLATE" });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href = url; a.download = "codekids-projects.zip";
        document.body.appendChild(a); a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (e) {
        console.error(e);
        alert("Could not download projects.");
      } finally {
        btn.disabled = false; btn.textContent = "⬇️ Download All";
      }
    });
  </script>
</body>
</html>
